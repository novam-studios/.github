name: Discord Notifications

on:
  push:
  pull_request:
  issues:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          REPO="${{ github.repository }}"
          EVENT="${{ github.event_name }}"
          ACTOR="${{ github.actor }}"
          AVATAR="https://github.com/${ACTOR}.png"
          TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Webhook identity (user-based)
          BOT_NAME="New Commit by ${ACTOR}"
          BOT_AVATAR="$AVATAR"

          # Default embed values
          COLOR=5814783
          TITLE="📦 GitHub Event"
          DESC="Triggered event"
          URL="https://github.com/${REPO}"
          REF="-"
          EXTRA="N/A"

          if [ "$EVENT" = "push" ]; then
            COLOR=3066993
            TITLE="🚀 New Push"
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            COMMIT_SHA="${{ github.sha }}"
            SHORT_SHA=${COMMIT_SHA:0:7}
            BRANCH="${{ github.ref_name }}"
            URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"

            DESC="**${COMMIT_MSG}**"
            REF="$SHORT_SHA"
            EXTRA="🌿 Branch: \`${BRANCH}\`"

          elif [ "$EVENT" = "pull_request" ]; then
            COLOR=15105570
            TITLE="🔀 Pull Request (${{ github.event.action }})"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_STATE="${{ github.event.pull_request.state }}"
            URL="${{ github.event.pull_request.html_url }}"

            DESC="**${PR_TITLE}**"
            REF="PR #${PR_NUM}"
            EXTRA="📌 Status: \`${PR_STATE}\`"

          elif [ "$EVENT" = "issues" ]; then
            COLOR=15158332
            TITLE="🐛 Issue (${{ github.event.action }})"
            ISSUE_TITLE="${{ github.event.issue.title }}"
            ISSUE_NUM="${{ github.event.issue.number }}"
            URL="${{ github.event.issue.html_url }}"

            DESC="**${ISSUE_TITLE}**"
            REF="Issue #${ISSUE_NUM}"
            EXTRA="📣 Action: \`${{ github.event.action }}\`"
          fi

          curl -H "Content-Type: application/json" \
          -d "{
            \"username\": \"${BOT_NAME}\",
            \"avatar_url\": \"${BOT_AVATAR}\",
            \"embeds\": [{
              \"title\": \"${TITLE}\",
              \"url\": \"${URL}\",
              \"color\": ${COLOR},
              \"author\": {
                \"name\": \"${ACTOR}\",
                \"icon_url\": \"${AVATAR}\",
                \"url\": \"https://github.com/${ACTOR}\"
              },
              \"thumbnail\": {
                \"url\": \"${AVATAR}\"
              },
              \"fields\": [
                {
                  \"name\": \"📦 Repository\",
                  \"value\": \"\`${REPO}\`\",
                  \"inline\": true
                },
                {
                  \"name\": \"⚡ Event\",
                  \"value\": \"\`${EVENT}\`\",
                  \"inline\": true
                },
                {
                  \"name\": \"🔢 Reference\",
                  \"value\": \"\`${REF}\`\",
                  \"inline\": true
                },
                {
                  \"name\": \"📝 Details\",
                  \"value\": \"${DESC}\",
                  \"inline\": false
                },
                {
                  \"name\": \"🔍 Extra Info\",
                  \"value\": \"${EXTRA}\",
                  \"inline\": false
                }
              ],
              \"footer\": {
                \"text\": \"GitHub Actions • ${REPO}\"
              },
              \"timestamp\": \"${TIME}\"
            }]
          }" \
          $WEBHOOK
